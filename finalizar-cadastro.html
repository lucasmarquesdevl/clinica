<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finalizar Cadastro — Lugar de Ser</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--paper);
      padding: 20px;
      min-height: 100vh;
    }

    .setup-card {
      background: var(--cream);
      border: 1.5px solid var(--border);
      border-radius: 20px;
      padding: 48px 40px;
      width: 480px;
      max-width: 100%;
      box-shadow: var(--shadow-lg);
      position: relative;
    }

    .setup-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, var(--primary), var(--sand));
      border-radius: 20px 20px 0 0;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: var(--ink);
      text-align: center;
    }

    .subtitle {
      color: var(--ink-soft);
      font-size: 0.95rem;
      text-align: center;
      margin-bottom: 32px;
    }

    .btn-full {
      width: 100%;
      justify-content: center;
      padding: 14px 20px;
      font-size: 1rem;
      margin-top: 10px;
    }

    .form-section {
      background: var(--paper);
      padding: 20px;
      border-radius: 12px;
      border: 1px dashed var(--sand);
      margin-bottom: 24px;
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(250, 245, 239, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: 20px;
      backdrop-filter: blur(2px);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--sand-light);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Success state */
    .success-view {
      display: none;
      text-align: center;
    }

    .success-icon {
      width: 64px;
      height: 64px;
      background: var(--sage-light);
      color: var(--sage-dark);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
  </style>
</head>

<body>

  <div class="setup-card">
    <div id="loading" class="loading-overlay">
      <div class="spinner"></div>
    </div>

    <!-- FORMULÁRIO DE SETUP -->
    <div id="view-setup">
      <h1>Seja bem-vinda! 🌿</h1>
      <p class="subtitle">Complete seus dados profissionais para começar a usar a plataforma.</p>

      <form id="setup-form">
        <div class="form-section">
          <div class="form-group">
            <label>Nome Completo</label>
            <input type="text" id="setup-nome" placeholder="Ex: Dra. Natália Trindade" required>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label>CRP</label>
            <input type="text" id="setup-crp" placeholder="00/00000" required maxlength="10">
            <small style="color: var(--ink-soft); font-size: 0.75rem; margin-top: 4px; display: block;">Formato: 00/00000</small>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Concluir e Acessar ➔
        </button>
      </form>
    </div>

    <!-- SUCESSO -->
    <div id="view-success" class="success-view">
      <div class="success-icon">✓</div>
      <h1>Cadastro Finalizado!</h1>
      <p style="color: var(--ink-soft); margin-bottom: 24px;">Seu perfil profissional foi configurado com sucesso. Você já pode acessar todas as funcionalidades.</p>
      <a href="index.html" class="btn btn-primary btn-full">Entrar no Sistema</a>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ezutgtfynlvbgbqmpqyb.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6dXRndGZ5bmx2YmdicW1wcXliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NDMyODcsImV4cCI6MjA5NDIxOTI4N30.' + 't1VcyLhhfe8n_l_YDUgkx6u-YGm_PpDG7lALE52loaE';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // Máscara para o CRP (00/00000)
    document.getElementById('setup-crp').addEventListener('input', function (e) {
      let v = e.target.value.replace(/\D/g, '');
      if (v.length > 2) v = v.slice(0, 2) + '/' + v.slice(2);
      e.target.value = v.slice(0, 9);
    });

    async function init() {
      // Verifica se o usuário chegou via link de convite (estará logado)
      const { data: { session } } = await _supabase.auth.getSession();
      
      if (!session) {
        alert("Link inválido ou expirado. Peça um novo convite ao administrador.");
        window.location.href = 'index.html';
        return;
      }
    }

    document.getElementById('setup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const nome = document.getElementById('setup-nome').value.trim();
      const crp = document.getElementById('setup-crp').value.trim();
      const loader = document.getElementById('loading');

      loader.style.display = 'flex';

      const { data: { user } } = await _supabase.auth.getUser();

      // Atualiza o perfil que foi criado automaticamente pelo Trigger
      const { error } = await _supabase
        .from('perfis')
        .update({ nome, crp })
        .eq('id', user.id);

      loader.style.display = 'none';

      if (error) {
        alert("Erro ao salvar dados: " + error.message);
      } else {
        document.getElementById('view-setup').style.display = 'none';
        document.getElementById('view-success').style.display = 'block';
      }
    });

    init();
  </script>
</body>

</html>
